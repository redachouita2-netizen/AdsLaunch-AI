<!DOCTYPE html>
<html>
<head>
    <title>AdsLaunch AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚀 AdsLaunch AI</h1>
    <p>AI-powered advertising platform</p>
</header>

<section class="hero">

<h2>Create Ads In Seconds With AI</h2>

<p>
Generate professional marketing content for your business.
</p>

</section>

<section class="auth">

<h2>Welcome to AdsLaunch AI</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">
Login
</button>
<section class="user-panel">

<h2>Dashboard</h2>

<p id="userEmail">
User
</p>

<p>
📊 Ads created: <span id="adCount">0</span>
</p>

<button id="logoutBtn">
Logout
</button>

</section>
</section>
<div class="dashboard">

<div class="card">
<h3>🤖 AI Ad Generator</h3>

<input id="product" placeholder="Product name">

<select id="platform">
<option>Facebook</option>
<option>Instagram</option>
<option>TikTok</option>
</select>

<select id="language">
<option>Arabic</option>
<option>French</option>
<option>English</option>
</select>

<button id="generateBtn">
Generate Ad
</button>

</div>


<div class="card">

<h3>Generated Result</h3>

<div id="result">
Your AI ad will appear here...
</div>

<button id="copyBtn">
Copy
</button>

</div>


</div>


<footer>
<p>© 2026 AdsLaunch AI</p>
</footer>


<script src="script.js"></script>

</body>
</html>
